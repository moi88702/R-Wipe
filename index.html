<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>R-Wipe Spaceship Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        /* `dvh` (dynamic viewport height) excludes the area hidden by mobile
           browser chrome (URL bar, bottom nav). Using `100vh` here would let
           the centred game-container overflow upward behind the URL bar and
           clip the fullscreen button + top HUD row. `dvh` is supported on
           iOS 15.4+, Chrome 108+, Firefox 101+. */
        height: 100dvh;
        background-color: #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Fit the canvas into the viewport while preserving the 16:9 aspect
         ratio. The internal Pixi resolution stays 1280x720 — CSS just scales
         the rendered canvas so the whole playfield is always visible, even
         under browser chrome that eats vertical space. */
      #game-container {
        width: min(100vw, calc(100dvh * 16 / 9));
        height: min(100dvh, calc(100vw * 9 / 16));
        display: block;
        position: relative;
      }

      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* Disable native touch gestures (scroll, pinch-zoom, double-tap-zoom)
           so mobile drag-to-move and double-tap-for-bomb don't trigger the
           browser instead of the game. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Portrait-rotated mode: the container is sized landscape and CSS-rotated
         +90° CW so the 1280×720 game fills the portrait screen. Only active for
         menus and solar-system; arcade gameplay shows the rotate hint instead. */
      #game-container.portrait-rotated {
        /* Swap width/height so it's landscape-sized before rotation */
        width: 100dvh !important;
        height: 100vw !important;
        /* Center then rotate */
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: 50% 50%;
      }

      /* Rotate hint: shown only when playing arcade mode in portrait. */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: #0a0a14;
        color: #fff;
        font-family: monospace;
        font-size: 18px;
        text-align: center;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
        flex-direction: column;
        gap: 16px;
      }
      body.show-rotate-hint #rotate-hint {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate-hint">
      <div style="font-size:48px">↻</div>
      <div>Rotate to landscape to play the arcade mode</div>
      <div style="font-size:13px;opacity:0.6">Solar system &amp; menus work in portrait</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
