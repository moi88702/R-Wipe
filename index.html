<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R-Type Clone</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000000;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #game-container {
        width: 1280px;
        height: 720px;
        /* Prevent any accidental scrollbars */
        overflow: hidden;
        /* Pixel-perfect rendering for retro look */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
