<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R-Wipe Spaceship Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Fit the canvas into the viewport while preserving the 16:9 aspect
         ratio. The internal Pixi resolution stays 1280x720 — CSS just scales
         the rendered canvas so the whole playfield is always visible, even
         under browser chrome that eats vertical space. */
      #game-container {
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        display: block;
      }

      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
