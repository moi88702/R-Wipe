<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>R-Wipe Spaceship Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Fit the canvas into the viewport while preserving the 16:9 aspect
         ratio. The internal Pixi resolution stays 1280x720 — CSS just scales
         the rendered canvas so the whole playfield is always visible, even
         under browser chrome that eats vertical space. */
      #game-container {
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        display: block;
        position: relative;
      }

      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* Disable native touch gestures (scroll, pinch-zoom, double-tap-zoom)
           so mobile drag-to-move and double-tap-for-bomb don't trigger the
           browser instead of the game. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Fullscreen toggle — small overlay button anchored top-right. Visible
         on all devices but chiefly useful on mobile to reclaim the ~80px of
         browser chrome that otherwise squeezes the 16:9 playfield. */
      #fullscreen-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(10, 10, 20, 0.55);
        color: #fff;
        font-size: 18px;
        line-height: 36px;
        text-align: center;
        cursor: pointer;
        z-index: 10;
        font-family: monospace;
        border-radius: 4px;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      #fullscreen-btn:hover,
      #fullscreen-btn:active {
        background: rgba(40, 40, 60, 0.75);
      }
      /* Rotation hint shown only when a phone is held in portrait. */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: #0a0a14;
        color: #fff;
        font-family: monospace;
        font-size: 18px;
        text-align: center;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <button id="fullscreen-btn" type="button" aria-label="Toggle fullscreen">⛶</button>
    </div>
    <div id="rotate-hint">Rotate your device to landscape to play</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
